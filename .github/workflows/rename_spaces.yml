name: Replace Spaces with Underscores

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  rename-files-and-folders:
    # GitHub Actions가 만든 커밋이면 다시 실행하지 않음
    if: github.actor != 'github-actions[bot]'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Rename spaces to underscores
        run: |
          python3 <<'PY'
          import os
          import unicodedata

          EXTRA_SPACES = {
              "\u200b",  # ZERO WIDTH SPACE
              "\u200c",  # ZERO WIDTH NON-JOINER
              "\u200d",  # ZERO WIDTH JOINER
              "\u2060",  # WORD JOINER
              "\ufeff",  # BOM
          }

          def normalize(name):
              return "".join(
                  "_"
                  if (
                      ch.isspace()
                      or unicodedata.category(ch).startswith("Z")
                      or ch in EXTRA_SPACES
                  )
                  else ch
                  for ch in name
              )

          for root, dirs, files in os.walk(".", topdown=False):

              # 디렉토리 이름 변경
              for d in dirs:
                  new_name = normalize(d)

                  if new_name != d:
                      old_path = os.path.join(root, d)
                      new_path = os.path.join(root, new_name)

                      if not os.path.exists(new_path):
                          print(f"DIR : {old_path} -> {new_path}")
                          os.rename(old_path, new_path)

              # 파일 이름 변경
              for f in files:
                  new_name = normalize(f)

                  if new_name != f:
                      old_path = os.path.join(root, f)
                      new_path = os.path.join(root, new_name)

                      if not os.path.exists(new_path):
                          print(f"FILE: {old_path} -> {new_path}")
                          os.rename(old_path, new_path)
          PY

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if ! git diff --cached --quiet; then
            ORIGINAL_MSG=$(git log -1 --pretty=%B)

            git commit -m "$ORIGINAL_MSG"
            git push
          else
            echo "Nothing to rename."
          fi

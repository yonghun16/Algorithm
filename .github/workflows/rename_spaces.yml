name: Replace Spaces with Underscores

on:
  push:
    branches:
      - main  # 내 기본 브랜치명이 master라면 master로 수정해 주세요

permissions:
  contents: write

jobs:
  rename-folders:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rename spaces to underscores in directories
        run: |
          # 무한루프 방지 안전 장치
          if [[ "${{ github.event.head_commit.message }}" == *"chore: 디렉토리 공백을 언더바로 변경"* ]]; then
            echo "Already renamed by Bot. Exiting."
            exit 0
          fi

          # 파이썬 정규식을 활용하여 눈에 보이지 않는 모든 유니코드 공백(\s)을 _로 완전히 치환
          python3 -c '
          import os, re, subprocess

          # 변경이 필요한 폴더들을 수집 (깊은 폴더부터 처리하기 위해 topdown=False 필수)
          for root, dirs, files in os.walk(".", topdown=False):
              for d in dirs:
                  # 일반 스페이스뿐 아니라 유니코드 특수 공백(\s)이 포함되어 있는지 확인
                  if re.search(r"\s", d):
                      old_path = os.path.join(root, d)
                      # 모든 종류의 공백을 언더바(_)로 교체
                      new_name = re.sub(r"\s+", "_", d)
                      new_path = os.path.join(root, new_name)
                      
                      # 만약 이름 변경 후 중복되는 폴더가 없다면 이름 변경 실행
                      if not os.path.exists(new_path):
                          print(f"Renaming: {old_path} -> {new_path}")
                          os.rename(old_path, new_path)
          '

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add -A
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: 디렉토리 공백을 언더바로 변경"
            git push origin HEAD
          else
            echo "No spaces found in folder names."
          fi

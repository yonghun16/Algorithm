name: Replace Spaces with Underscores

on:
  push:
    branches:
      - main # 기본 브랜치가 master라면 master로 변경

permissions:
  contents: write

jobs:
  rename-files-and-folders:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rename spaces to underscores
        run: |
          # 무한 루프 방지
          if [[ "${{ github.event.head_commit.message }}" == *"chore: replace spaces with underscores"* ]]; then
            echo "Already renamed by bot."
            exit 0
          fi

          python3 <<'PY'
          import os
          import unicodedata

          EXTRA_SPACES = {
              "\u200b",  # ZERO WIDTH SPACE
              "\u200c",  # ZERO WIDTH NON-JOINER
              "\u200d",  # ZERO WIDTH JOINER
              "\u2060",  # WORD JOINER
              "\ufeff",  # BOM
          }

          def normalize(name):
              return "".join(
                  "_"
                  if (
                      ch.isspace()
                      or unicodedata.category(ch).startswith("Z")
                      or ch in EXTRA_SPACES
                  )
                  else ch
                  for ch in name
              )

          for root, dirs, files in os.walk(".", topdown=False):

              # 디렉토리 이름 변경
              for d in dirs:
                  new_name = normalize(d)

                  if new_name != d:
                      old_path = os.path.join(root, d)
                      new_path = os.path.join(root, new_name)

                      if not os.path.exists(new_path):
                          print(f"DIR : {old_path} -> {new_path}")
                          os.rename(old_path, new_path)

              # 파일 이름 변경
              for f in files:
                  new_name = normalize(f)

                  if new_name != f:
                      old_path = os.path.join(root, f)
                      new_path = os.path.join(root, new_name)

                      if not os.path.exists(new_path):
                          print(f"FILE: {old_path} -> {new_path}")
                          os.rename(old_path, new_path)
          PY

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: replace spaces with underscores"
            git push origin HEAD
          else
            echo "No files or directories to rename."
          fi
